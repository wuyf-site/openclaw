<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股行情 Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #fff;
        }
        h1 { text-align: center; }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin: 30px auto;
        }
        .link-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: transform 0.2s;
        }
        .link-card:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.15);
        }
        .note {
            text-align: center;
            color: #888;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <h1>A股行情 Dashboard</h1>
    
    <div class="links">
        <a href="https://radiological-euphemistically-ja.ngrok-free.dev" class="link-card" target="_blank">
            <h2>📊 实时行情 Dashboard</h2>
            <p>查看A股指数、有色金属价差</p>
        </a>
        
        <a href="https://github.com/wuyf-site/openclaw" class="link-card" target="_blank">
            <h2>📝 Obsidian 笔记</h2>
            <p>查看每日行情记录</p>
        </a>
    </div>
    
    <p class="note">
        由 OpenClaw 自动更新<br>
        最后更新: <span id="update-time"></span>
    </p>
    
    <script>
        document.getElementById('update-time').textContent = new Date().toLocaleString('zh-CN');
    </script>
</body>
</html>
